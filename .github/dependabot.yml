version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns: ['astro', '@astrojs/*']
      dev-dependencies:
        dependency-type: development
    labels: ['dependencies']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    labels: ['dependencies', 'ci']
