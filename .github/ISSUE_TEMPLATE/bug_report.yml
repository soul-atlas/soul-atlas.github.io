name: 🐞 Bug report
description: Something on the website or in the tooling is broken.
title: '[Bug] '
labels: ['bug']
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
  - type: input
    id: where
    attributes:
      label: Where?
      description: URL, command, or file.
  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser / OS, or Node + npm version for tooling bugs.
