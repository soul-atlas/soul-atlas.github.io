name: Suggestion review

# Deterministically reviews community suggestion PRs (the records the worker drops
# under suggestions/). Posts a verdict comment and labels the PR so the apply
# workflow knows whether /lgtm may auto-apply it.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'suggestions/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: suggestion-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Find changed suggestion records
        id: changed
        run: |
          files=$(git diff --name-only --diff-filter=AM \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            -- 'suggestions/**/*.md' | grep -v '/README.md$' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Review
        id: review
        env:
          COMMENT_FILE: ${{ runner.temp }}/review.md
        run: |
          node scripts/review-suggestion.mjs ${{ steps.changed.outputs.files }}

      - name: Comment and label
        uses: actions/github-script@v7
        env:
          PASS: ${{ steps.review.outputs.pass }}
          COMMENT_FILE: ${{ runner.temp }}/review.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- suggestion-review-bot -->';
            const body = marker + '\n' + fs.readFileSync(process.env.COMMENT_FILE, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            // Upsert a single sticky comment.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

            // Reflect the verdict in labels.
            const pass = process.env.PASS === 'true';
            const add = pass ? 'suggestion-review-passed' : 'suggestion-review-failed';
            const remove = pass ? 'suggestion-review-failed' : 'suggestion-review-passed';
            for (const name of [add, remove]) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch {
                await github.rest.issues.createLabel({
                  owner, repo, name,
                  color: name.endsWith('passed') ? '0e8a16' : 'b60205',
                });
              }
            }
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [add] });
            try {
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name: remove });
            } catch { /* not present */ }
