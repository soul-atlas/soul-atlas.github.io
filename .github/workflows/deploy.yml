name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for git-derived page metadata
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/configure-pages@v6
        id: pages
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # User/org page served at the domain root.
          SITE_URL: https://soul-atlas.github.io
          BASE_PATH: /
          GITHUB_REPO: soul-atlas/soul-atlas.github.io
          PUBLIC_SUGGEST_ENDPOINT: ${{ vars.PUBLIC_SUGGEST_ENDPOINT }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
