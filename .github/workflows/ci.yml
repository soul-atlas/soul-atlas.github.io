name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so git-derived metadata is available
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate metadata, sections, and relationships
        run: npm run validate
      - name: Lint SOUL markdown
        run: npm run lint:md

  build:
    name: Build site + API + search index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (generate + astro + pagefind)
        run: npm run build
        env:
          SITE_URL: https://soul-atlas.github.io
          BASE_PATH: /
      - name: Check API + graph integrity
        run: node scripts/validate.mjs
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: dist
          retention-days: 7

  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Prettier check
        run: npm run format:check
