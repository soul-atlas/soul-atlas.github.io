<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="SOUL Atlas — a universe of souls: a luminous constellation of connected minds.">
  <defs>
    <radialGradient id="space" cx="0.5" cy="0.46" r="0.85">
      <stop offset="0" stop-color="#101a3a"/>
      <stop offset="0.45" stop-color="#0b1026"/>
      <stop offset="1" stop-color="#06070d"/>
    </radialGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.25" stop-color="#bcd6ff"/>
      <stop offset="0.6" stop-color="#316bf4"/>
      <stop offset="1" stop-color="#316bf4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b5bdb" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b5bdb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0891b2" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="1200" height="420" fill="url(#space)"/>

  <!-- nebula clouds -->
  <ellipse cx="600" cy="205" rx="380" ry="240" fill="url(#neb1)"/>
  <ellipse cx="340" cy="150" rx="240" ry="170" fill="url(#neb2)"/>
  <ellipse cx="880" cy="270" rx="260" ry="180" fill="url(#neb3)"/>

  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="70" cy="60" r="1.1" opacity="0.7"/><circle cx="140" cy="120" r="0.8" opacity="0.5"/>
    <circle cx="210" cy="40" r="1.4" opacity="0.85"/><circle cx="260" cy="300" r="1" opacity="0.6"/>
    <circle cx="120" cy="360" r="1.2" opacity="0.7"/><circle cx="40" cy="220" r="0.9" opacity="0.5"/>
    <circle cx="330" cy="380" r="1" opacity="0.55"/><circle cx="420" cy="70" r="1.3" opacity="0.8"/>
    <circle cx="500" cy="350" r="0.9" opacity="0.5"/><circle cx="560" cy="40" r="1.1" opacity="0.7"/>
    <circle cx="690" cy="60" r="0.8" opacity="0.5"/><circle cx="760" cy="360" r="1.3" opacity="0.8"/>
    <circle cx="840" cy="50" r="1" opacity="0.6"/><circle cx="930" cy="120" r="0.9" opacity="0.55"/>
    <circle cx="1010" cy="60" r="1.2" opacity="0.75"/><circle cx="1080" cy="160" r="0.8" opacity="0.5"/>
    <circle cx="1140" cy="90" r="1.1" opacity="0.7"/><circle cx="1160" cy="300" r="1" opacity="0.6"/>
    <circle cx="1090" cy="370" r="1.3" opacity="0.8"/><circle cx="980" cy="360" r="0.9" opacity="0.5"/>
    <circle cx="870" cy="380" r="1" opacity="0.55"/><circle cx="640" cy="380" r="0.8" opacity="0.5"/>
    <circle cx="30" cy="120" r="1" opacity="0.6"/><circle cx="1170" cy="200" r="0.9" opacity="0.5"/>
    <circle cx="180" cy="200" r="0.7" opacity="0.45"/><circle cx="450" cy="200" r="0.7" opacity="0.4"/>
    <circle cx="1020" cy="240" r="0.7" opacity="0.45"/><circle cx="720" cy="150" r="0.7" opacity="0.4"/>
  </g>

  <!-- orbital rings around the core -->
  <g transform="translate(600 205)" fill="none" stroke="#6f9bff" stroke-opacity="0.22">
    <ellipse rx="150" ry="56" transform="rotate(-18)"/>
    <ellipse rx="210" ry="80" transform="rotate(14)"/>
    <ellipse rx="270" ry="104" transform="rotate(-6)"/>
  </g>

  <!-- constellation: edges between souls -->
  <g stroke="#8fa6dd" stroke-opacity="0.28" stroke-width="1.1">
    <line x1="600" y1="205" x2="455" y2="150"/><line x1="600" y1="205" x2="735" y2="138"/>
    <line x1="600" y1="205" x2="700" y2="282"/><line x1="600" y1="205" x2="492" y2="262"/>
    <line x1="600" y1="205" x2="800" y2="196"/><line x1="455" y1="150" x2="372" y2="206"/>
    <line x1="735" y1="138" x2="828" y2="104"/><line x1="800" y1="196" x2="900" y2="250"/>
    <line x1="700" y1="282" x2="800" y2="320"/><line x1="492" y1="262" x2="400" y2="312"/>
    <line x1="372" y1="206" x2="300" y2="150"/><line x1="900" y1="250" x2="980" y2="200"/>
    <line x1="828" y1="104" x2="930" y2="78"/><line x1="455" y1="150" x2="492" y2="262"/>
    <line x1="800" y1="320" x2="900" y2="250"/><line x1="980" y1="200" x2="1040" y2="276"/>
    <line x1="300" y1="150" x2="250" y2="250"/><line x1="700" y1="282" x2="600" y2="205"/>
  </g>

  <!-- soul-node halos -->
  <g filter="url(#soft)" opacity="0.6">
    <circle cx="455" cy="150" r="9" fill="#3b82f6"/><circle cx="735" cy="138" r="8" fill="#10b981"/>
    <circle cx="800" cy="196" r="9" fill="#06b6d4"/><circle cx="700" cy="282" r="8" fill="#ec4899"/>
    <circle cx="492" cy="262" r="8" fill="#8b5cf6"/><circle cx="900" cy="250" r="7" fill="#eab308"/>
  </g>

  <!-- soul nodes (domain-colored) -->
  <g stroke="#06070d" stroke-width="1.3">
    <circle cx="455" cy="150" r="7" fill="#3b82f6"/>
    <circle cx="735" cy="138" r="6.5" fill="#10b981"/>
    <circle cx="828" cy="104" r="5" fill="#f59e0b"/>
    <circle cx="930" cy="78" r="4.5" fill="#ef4444"/>
    <circle cx="800" cy="196" r="7.5" fill="#06b6d4"/>
    <circle cx="980" cy="200" r="5.5" fill="#84cc16"/>
    <circle cx="1040" cy="276" r="5" fill="#d946ef"/>
    <circle cx="700" cy="282" r="6.5" fill="#ec4899"/>
    <circle cx="800" cy="320" r="5" fill="#a855f7"/>
    <circle cx="492" cy="262" r="6" fill="#8b5cf6"/>
    <circle cx="400" cy="312" r="5" fill="#22c55e"/>
    <circle cx="372" cy="206" r="6" fill="#14b8a6"/>
    <circle cx="300" cy="150" r="5" fill="#0891b2"/>
    <circle cx="250" cy="250" r="4.5" fill="#fb7185"/>
    <circle cx="900" cy="250" r="6" fill="#eab308"/>
  </g>

  <!-- luminous core: the atlas of all souls -->
  <circle cx="600" cy="205" r="78" fill="url(#core)"/>
  <circle cx="600" cy="205" r="13" fill="#ffffff" filter="url(#blur)"/>
  <circle cx="600" cy="205" r="7" fill="#ffffff"/>
</svg>
